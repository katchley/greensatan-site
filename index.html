<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>greensatan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: #0C1E0C;
      color: #E8F5E8;
      font-family: 'Manrope', sans-serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 1.7;
    }

    .banner-wrap {
      position: relative;
    }

    .banner {
      width: 100%;
      height: auto;
      display: block;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .bio {
      margin-bottom: 1.5rem;
    }

    .bio strong {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .coming-soon {
      color: #73D047;
      margin-bottom: 2.5rem;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spotify-wrap {
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <div class="banner-wrap">
    <img
      class="banner"
      src="greensatan_horned_psychedelic.png"
      srcset="greensatan_horned_psychedelic-768x178.png 768w,
              greensatan_horned_psychedelic-1536x357.png 1536w,
              greensatan_horned_psychedelic.png 1919w"
      sizes="100vw"
      alt="greensatan"
      width="1919"
      height="446"
    >
  </div>

  <main>
    <p class="bio">
      <strong>greensatan</strong> is an electronic music project rooted in improvisation and psychedelia.
      The music betrays influences of post avant-garde electronics, minimal techno, noise, genre film scores and sound-design.
    </p>

    <p class="coming-soon">Soon To Be Announced: Upcoming July/August Performances</p>

    <div class="spotify-wrap">
      <iframe
        style="border-radius:12px"
        src="https://open.spotify.com/embed/track/1GQe0xuHvmE9Ib3hIFctKv?utm_source=generator&theme=0"
        width="100%"
        height="152"
        frameborder="0"
        allowfullscreen
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"
      ></iframe>
      <iframe
        style="border: 0; width: 100%; height: 120px; margin-top: 1.5rem; border-radius: 12px;"
        src="https://bandcamp.com/EmbeddedPlayer/album=3101194291/size=large/bgcol=181818/linkcol=0f91ff/tracklist=false/artwork=small/transparent=true/"
        seamless
      ><a href="https://greensatan.bandcamp.com/album/casting-winters-circle">Casting Winter&#39;s Circle by greensatan</a></iframe>
    </div>
  </main>

</body>
</html>
